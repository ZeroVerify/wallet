name: Deploy to S3 + CloudFront

on:
  push:
    branches:
      - master

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: npm

      - run: npm ci

      - run: npm run build

      - run: cp dist/index.html dist/404.html

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://wallet.zeroverify.net
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::043189681060:role/ZeroVerifyGitHubActionsWalletDeployment
          aws-region: us-east-1

      - name: Sync to S3
        run: |
          aws s3 sync dist/ s3://WALLET_BUCKET_PLACEHOLDER \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html" \
            --exclude "404.html"
          aws s3 cp dist/index.html s3://WILL_ADD_WALLET_S3/index.html \
            --cache-control "no-cache,no-store,must-revalidate"
          aws s3 cp dist/404.html s3://WILL_ADD_WALLET_S3/404.html \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id WILL_ADD_CLOUDFRONT_DISTRIBUTION_ID \
            --paths "/*"
